<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تطبيق عبد الرحمن لمساعدة المسلمين</title>
    <style>
        body { background: url("https://img.freepik.com/premium-photo/dark-islamic-background-with-mosque-silhouette-golden-ornaments_1130458-3850.jpg") no-repeat center center fixed; background-size: cover; color:white; padding:10px; font-family:Arial; direction: rtl; }
        .container { background: rgba(0,0,0,0.85); padding: 15px; border-radius: 20px; min-height: 95vh; display: flex; flex-direction: column; align-items: center; }
        .btn-main { padding:18px; background:#27ae60; color:white; border:none; border-radius:12px; margin:6px; width:95%; font-size:18px; font-weight:bold; cursor: pointer; display: block; text-decoration: none; text-align: center; }
        .alert-btn { background:#f39c12; animation: pulse 2s infinite; border: 2px solid #fff; }
        .azan-btn { background:#2980b9; margin-bottom: 10px; border: 2px solid #fff; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.03); } 100% { transform: scale(1); } }
    </style>
</head>
<body>
    <div class="container">
        <h1 style="text-align:center; font-size: 18px; border: 2px solid #27ae60; padding:10px; border-radius:15px; background: rgba(0,0,0,0.8); width: 90%;">عبد الرحمن شاب مسلم هيساعد المسلمين</h1>
        <button id="azanBtn" class="btn-main azan-btn" onclick="toggleAzan()">🕋 اضغط لتفعيل الأذان في جميع الصلوات</button>
        <button id="audioBtn" class="btn-main alert-btn" onclick="toggleProphet()">🔔 اضغط هنا لتفعيل تنبيه الصلاة على النبي</button>
        <a href="https://abdo011-ops.github.io/noor/" class="btn-main">🕋 مواقيت الصلاة</a>
        <a href="#" class="btn-main" style="background:#2980b9;">📖 المصحف الكريم</a>
        <a href="#" class="btn-main" style="background:#f1c40f; color:black;">📜 الأحاديث النبوية</a>
        <a href="#" class="btn-main" style="background:#16a085;">📿 السبحة الإلكترونية الذكية</a>
        <a href="#" class="btn-main" style="background:#e74c3c;">📻 إذاعة القرآن الكريم</a>
    </div>

    <script>
        var prophetAudio = new Audio("https://f.top4top.io/m_2402v3u0l1.mp3");
        var azanAudio = new Audio("https://www.islamcan.com/audio/adan/azan1.mp3");
        var isProphetEnabled = false; var isAzanEnabled = false;

        function toggleAzan() {
            if (!isAzanEnabled) { azanAudio.play(); isAzanEnabled = true; document.getElementById('azanBtn').style.background = "#27ae60"; }
            else { azanAudio.pause(); isAzanEnabled = false; document.getElementById('azanBtn').style.background = "#2980b9"; }
        }

        function toggleProphet() {
            if (!isProphetEnabled) { prophetAudio.play(); isProphetEnabled = true; document.getElementById('audioBtn').style.background = "#27ae60"; }
            else { prophetAudio.pause(); isProphetEnabled = false; document.getElementById('audioBtn').style.background = "#f39c12"; }
        }
    </script>
</body>
</html>
