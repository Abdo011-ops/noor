<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>سجل الزوار - أوفر درايف</title>
    <style>
        body { background: #0b0f14; color: white; font-family: Arial; text-align: center; padding: 20px; }
        .container { max-width: 950px; margin: auto; background: #1c1f26; padding: 20px; border-radius: 15px; border: 1px solid #333; }
        h2 { color: #007bff; border-bottom: 2px solid #333; padding-bottom: 10px; }
        table { width: 100%; margin-top: 20px; border-collapse: collapse; font-size: 12px; }
        th, td { border: 1px solid #333; padding: 10px; text-align: center; }
        th { background: #1e3a8a; color: white; }
        tr:nth-child(even) { background: #161b22; }
        .device-name { color: #f1c40f; font-weight: bold; }
        .btn-clear { background: #b91c1c; color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; margin-bottom: 15px; }
    </style>
</head>
<body>
<div class="container">
    <h2>📋 سجل الزوار (مراقبة الأجهزة)</h2>
    <button class="btn-clear" onclick="clearLogs()">مسح السجل</button>
    <table>
        <thead>
            <tr>
                <th>التوقيت</th>
                <th>الـ IP</th>
                <th>اسم الجهاز / النظام</th>
                <th>بيانات إضافية</th>
            </tr>
        </thead>
        <tbody id="logTable"></tbody>
    </table>
    <br><a href="dashboard.html" style="color:#888; text-decoration:none;">⬅️ عودة للوحة التحكم</a>
</div>

<script>
    window.onload = displayLogs;

    function displayLogs() {
        let logs = JSON.parse(localStorage.getItem('visitorLogs') || '[]');
        const tableBody = document.getElementById('logTable');
        tableBody.innerHTML = '';

        logs.forEach(log => {
            let ua = log.device;
            let deviceFinal = "جهاز غير معروف";

            // محرك فحص الأجهزة المطور
            if (ua.includes("Android")) {
                // محاولة استخراج الموديل، ولو فشل يكتب أندرويد
                let parts = ua.match(/\(([^)]+)\)/);
                if (parts && parts[1]) {
                    let details = parts[1].split(';');
                    deviceFinal = details.length > 2 ? details[2] : "Android Device";
                } else {
                    deviceFinal = "Android Phone";
                }
            } else if (ua.includes("iPhone")) {
                deviceFinal = "iPhone";
            } else if (ua.includes("Windows")) {
                deviceFinal = "Windows PC";
            }

            tableBody.innerHTML += `
                <tr>
                    <td>${log.time}</td>
                    <td style="color:#2ecc71;">${log.ip || '---'}</td>
                    <td class="device-name">${deviceFinal}</td>
                    <td style="color:#aaa; font-size:10px;">${ua.substring(0, 50)}...</td>
                </tr>
            `;
        });
    }

    function clearLogs() {
        if(confirm("مسح السجل؟")) { localStorage.setItem('visitorLogs', '[]'); displayLogs(); }
    }
</script>
</body>
</html>
