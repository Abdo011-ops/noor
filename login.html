<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - أوفر درايف</title>
    <style>
        body { background-color: #0b0f14; color: white; font-family: Arial, sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .login-card { background: #1c1f26; padding: 30px; border-radius: 20px; border: 1px solid #333; width: 320px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h2 { color: #007bff; margin-bottom: 25px; }
        input { width: 90%; padding: 12px; margin: 10px 0; background: #000; border: 1px solid #444; color: white; border-radius: 8px; text-align: center; font-size: 16px; }
        .btn-login { background: #007bff; color: white; border: none; padding: 12px; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 15px; transition: 0.3s; }
        .btn-login:hover { background: #0056b3; }
        .back-home { display: block; margin-top: 20px; color: #888; text-decoration: none; font-size: 12px; }
    </style>
</head>
<body>

<div class="login-card">
    <h2>دخول النظام 🔐</h2>
    <input type="text" id="userInp" placeholder="رقم الهاتف">
    <input type="password" id="passInp" placeholder="كلمة السر">
    <button class="btn-login" onclick="checkAccess()">دخول</button>
    <a href="index.html" class="back-home">العودة للرئيسية</a>
</div>

<script>
    function checkAccess() {
        const user = document.getElementById('userInp').value.trim();
        const pass = document.getElementById('passInp').value.trim();

        // بياناتك الرسمية كمدير (Admin)
        const myAdminUser = "01153297929";
        const myAdminPass = "Abdo@011";

        // التحقق من البيانات
        if (user === myAdminUser && pass === myAdminPass) {
            alert("أهلاً يا مدير عبد الرحمن! جاري فتح لوحة التحكم...");
            window.location.href = "dashboard.html";
        } else {
            // التحقق من المستخدمين الآخرين المضافين في "إدارة المستخدمين"
            let users = JSON.parse(localStorage.getItem('systemUsers') || '[]');
            const found = users.find(u => u.name === user && u.pass === pass);
            
            if (found) {
                if (found.role === "admin") {
                    window.location.href = "dashboard.html";
                } else {
                    window.location.href = "user_page.html";
                }
            } else {
                alert("بيانات الدخول غير صحيحة!");
            }
        }
    }
</script>

</body>
</html>
