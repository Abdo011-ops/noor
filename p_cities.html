<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مواقيت الصلاة - عبد الرحمن</title>
    <style>
        body { background: url("https://img.freepik.com/premium-photo/dark-islamic-background-with-mosque-silhouette-golden-ornaments_1130458-3850.jpg") no-repeat center center fixed; background-size: cover; color:white; padding:10px; font-family:Arial; direction: rtl; }
        .container { background: rgba(0,0,0,0.85); padding: 15px; border-radius: 20px; min-height: 95vh; display: flex; flex-direction: column; align-items: center; }
        .btn-main { padding:18px; background:#333; color:white; border:1px solid #27ae60; border-radius:12px; margin:6px; width:95%; font-size:18px; font-weight:bold; cursor: pointer; text-decoration: none; text-align: center; }
        .grid-container { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; width: 100%; margin-top:10px; }
    </style>
</head>
<body>
    <div class="container">
        <h2 style="color:#27ae60;">اختر المحافظة</h2>
        <div class="grid-container">
            <a href="#" class="btn-main">الفيوم</a>
            <a href="#" class="btn-main">القاهرة</a>
            <a href="#" class="btn-main">الجيزة</a>
            <a href="#" class="btn-main">الإسكندرية</a>
            </div>
        <a href="index.html" class="btn-main" style="background:#555; width:60%; margin-top:20px;">🏠 الرئيسية</a>
    </div>
</body>
</html>
