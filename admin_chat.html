<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>دردشة العملاء - لوحة التحكم</title>
    <style>
        body { background: #0b0f14; color: white; font-family: Arial; padding: 20px; }
        .chat-container { max-width: 500px; margin: auto; background: #1c1f26; border-radius: 15px; border: 1px solid #333; overflow: hidden; }
        .chat-header { background: #1e3a8a; padding: 15px; font-weight: bold; text-align: center; }
        #chat-box { height: 350px; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; background: #f4f4f4; }
        .msg { margin-bottom: 10px; padding: 10px; border-radius: 10px; max-width: 80%; font-size: 14px; }
        .client-msg { background: #d1d5db; color: black; align-self: flex-start; }
        .admin-msg { background: #1e3a8a; color: white; align-self: flex-end; }
        .input-area { display: flex; padding: 10px; background: #eee; }
        input { flex: 1; padding: 10px; border: 1px solid #ccc; border-radius: 5px; outline: none; }
        button { background: #1e3a8a; color: white; border: none; padding: 10px 15px; margin-right: 5px; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">🗨️ دردشة مباشرة مع العميل</div>
        <div id="chat-box"></div>
        <div class="input-area">
            <input type="text" id="adminInput" placeholder="اكتب ردك هنا...">
            <button onclick="sendAdminReply()">إرسال</button>
        </div>
    </div>
    <p align="center"><a href="dashboard.html" style="color: #888; text-decoration: none;">العودة للوحة التحكم</a></p>

    <script>
        function loadChat() {
            let messages = JSON.parse(localStorage.getItem('live_chat_data') || '[]');
            const chatBox = document.getElementById('chat-box');
            chatBox.innerHTML = '';
            messages.forEach(m => {
                let div = document.createElement('div');
                div.className = 'msg ' + (m.role === 'admin' ? 'admin-msg' : 'client-msg');
                div.innerText = m.text;
                chatBox.appendChild(div);
            });
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function sendAdminReply() {
            let inp = document.getElementById('adminInput');
            if(inp.value.trim() !== "") {
                let messages = JSON.parse(localStorage.getItem('live_chat_data') || '[]');
                messages.push({ role: 'admin', text: inp.value });
                localStorage.setItem('live_chat_data', JSON.stringify(messages));
                inp.value = '';
                loadChat();
            }
        }
        setInterval(loadChat, 1000); // تحديث المحادثة كل ثانية
    </script>
</body>
</html>
